<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="960" height="960" rx="180" ry="180" fill="url(#bg)"/>
  
  <!-- Molecular bonds (lines) -->
  <g stroke="url(#accent)" stroke-width="24" stroke-linecap="round" opacity="0.6">
    <line x1="512" y1="320" x2="350" y2="480"/>
    <line x1="512" y1="320" x2="674" y2="480"/>
    <line x1="350" y1="480" x2="350" y2="680"/>
    <line x1="674" y1="480" x2="674" y2="680"/>
    <line x1="350" y1="680" x2="512" y2="780"/>
    <line x1="674" y1="680" x2="512" y2="780"/>
  </g>
  
  <!-- Molecular nodes (atoms) -->
  <g>
    <!-- Top atom - larger, main -->
    <circle cx="512" cy="320" r="80" fill="url(#accent)"/>
    <text x="512" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#0f172a">L</text>
    
    <!-- Left atoms -->
    <circle cx="350" cy="480" r="55" fill="url(#accent2)"/>
    <circle cx="350" cy="680" r="55" fill="url(#accent)"/>
    
    <!-- Right atoms -->
    <circle cx="674" cy="480" r="55" fill="url(#accent)"/>
    <circle cx="674" cy="680" r="55" fill="url(#accent2)"/>
    
    <!-- Bottom atom -->
    <circle cx="512" cy="780" r="65" fill="url(#accent2)"/>
    <text x="512" y="800" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#0f172a">X</text>
  </g>
</svg>
