# Single same-origin entry: / -> frontend, /api/* -> gateway (HTTP + WebSocket + streaming).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Uploads (structures, trajectories) can be large.
    client_max_body_size 512m;

    # Liveness for the proxy container's healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok
";
        add_header Content-Type text/plain;
    }

    # API + job WebSocket + any SSE/streaming -> gateway.
    location /api/ {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived sockets / streaming responses must not buffer or time out.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Everything else -> Next.js frontend.
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
