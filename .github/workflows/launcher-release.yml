name: Build & Release Public Launcher

on:
  push:
    branches:
      - main
    tags:
      - 'launcher-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0). Leave as latest for the rolling public release.'
        required: true
        default: 'latest'

permissions:
  contents: write

env:
  # Match go.mod (`go 1.25.0`) so CI uses the project toolchain directly
  # instead of auto-downloading a newer one mid-build.
  GO_VERSION: '1.25'
  # Pin the Wails CLI to the version in go.mod to avoid CLI/library drift
  # (the build log warned: "go.mod is using Wails '2.11.0' but the CLI is 'v2.12.0'").
  WAILS_VERSION: 'v2.11.0'
  PUBLIC_RELEASE_TAG: latest

concurrency:
  group: public-launcher-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Linux Build - Creates AppImage
  # ============================================================
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config libfuse2t64 file imagemagick

      - name: Build Linux public binary
        run: |
          set -euo pipefail
          WAILS_BIN="$(go env GOPATH)/bin/wails"
          "$WAILS_BIN" build -platform linux/amd64 -tags "public,webkit2_41" -o ligandx
          # Fail loudly if this is the non-production stub (it embeds
          # internal/app/app_default_unix.go, which is //go:build !production).
          if grep -aq "app_default_unix.go" build/bin/ligandx; then
            echo "::error::Built binary is the Wails stub (missing 'production' tag)"
            exit 1
          fi

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Create AppImage
        run: |
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/icons/hicolor/1024x1024/apps

          # Copy binary
          cp build/bin/ligandx AppDir/usr/bin/

          # Copy icons
          cp build/appicon.png AppDir/usr/share/icons/hicolor/1024x1024/apps/ligandx.png
          convert build/appicon.png -resize 256x256 AppDir/usr/share/icons/hicolor/256x256/apps/ligandx.png
          cp AppDir/usr/share/icons/hicolor/256x256/apps/ligandx.png AppDir/ligandx.png

          # Copy desktop file
          sed \
            -e 's/^Name=.*/Name=Ligand-X/' \
            -e 's/^Exec=.*/Exec=ligandx/' \
            -e 's/^Icon=.*/Icon=ligandx/' \
            -e 's/^StartupWMClass=.*/StartupWMClass=ligandx/' \
            build/linux/ligandx-launcher.desktop > AppDir/usr/share/applications/ligandx.desktop
          cp AppDir/usr/share/applications/ligandx.desktop AppDir/

          # Build AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/ligandx.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/ligandx.png \
            --output appimage

          # Rename output
          mv Ligand-X*.AppImage ligandx-linux-amd64.AppImage || \
          mv Ligandx*.AppImage ligandx-linux-amd64.AppImage || \
          mv *.AppImage ligandx-linux-amd64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ligandx-linux-amd64.AppImage
          path: ligandx-linux-amd64.AppImage
          if-no-files-found: error
          retention-days: 5

  # ============================================================
  # Windows Build - Portable production binary (double-click to run)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build Windows public binary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:PATH;$env:USERPROFILE\go\bin"

          # Portable production build. `wails build` injects the `production`
          # build tag; WITHOUT it the binary is a stub that, on launch, only
          # shows "Wails applications will not build without the correct build
          # tags. Please use 'wails build'...". We ship the bare exe (no NSIS):
          # it matches the "double-click to run, no install" release notes and
          # removes the makensis dependency that was silently failing.
          wails build -platform windows/amd64 -tags public -o ligandx
          if ($LASTEXITCODE -ne 0) { throw "wails build failed (exit $LASTEXITCODE)" }

          # Discover the produced binary by name, NOT by extension: this Wails
          # CLI writes `build/bin/ligandx` with NO .exe suffix. The old pipeline
          # assumed `ligandx.exe`, silently missed it, and shipped nothing
          # (leaving a stale, broken release asset).
          $exe = Get-ChildItem -Path "build/bin" -File |
            Where-Object { $_.Name -eq "ligandx" -or $_.Name -eq "ligandx.exe" } |
            Select-Object -First 1
          if (-not $exe) {
            Write-Host "Contents of build/bin:"
            Get-ChildItem -Path "build/bin" -ErrorAction SilentlyContinue
            throw "No launcher binary (ligandx) produced by wails build in build/bin"
          }

          # Fail loudly if we somehow produced the non-production stub. A real
          # `wails build` output excludes internal/app/app_default_windows.go
          # (it is //go:build !production); its presence means the tag was lost.
          $contents = [System.IO.File]::ReadAllText($exe.FullName, [System.Text.Encoding]::ASCII)
          if ($contents.Contains("app_default_windows.go")) {
            throw "Built binary is the Wails stub (missing 'production' tag) - refusing to ship"
          }

          # Always emit a .exe so Windows treats it as runnable on double-click.
          Move-Item $exe.FullName "build/bin/ligandx-windows-amd64.exe" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ligandx-windows-amd64.exe
          path: build/bin/ligandx-windows-amd64.exe
          if-no-files-found: error
          retention-days: 5

  # ============================================================
  # macOS Universal Build - Creates DMG (Intel + Apple Silicon)
  # ============================================================
  build-macos-universal:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build macOS public universal app
        run: |
          set -euo pipefail
          WAILS_BIN="$(go env GOPATH)/bin/wails"
          "$WAILS_BIN" build -platform darwin/universal -tags public -o ligandx
          # Fail loudly if this is the non-production stub (it embeds
          # internal/app/app_default_unix.go, which is //go:build !production).
          if grep -aqr "app_default_unix.go" build/bin/ligandx.app/Contents/MacOS/; then
            echo "::error::Built binary is the Wails stub (missing 'production' tag)"
            exit 1
          fi

      - name: Create DMG
        run: |
          # Find the .app bundle
          APP_PATH="build/bin/ligandx.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build/bin -name "*.app" -type d | head -1)
          fi

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Error: .app bundle not found"
            ls -la build/bin/
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          create-dmg \
            --volname "Ligand-X" \
            --volicon "build/darwin/appicon.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 190 \
            --icon "$(basename "$APP_PATH")" 200 190 \
            --hide-extension "$(basename "$APP_PATH")" \
            --no-internet-enable \
            "ligandx-darwin-universal.dmg" \
            "$APP_PATH" || {
              if [ -f "ligandx-darwin-universal.dmg" ]; then
                echo "DMG created successfully"
              else
                echo "DMG creation failed"
                exit 1
              fi
            }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ligandx-darwin-universal.dmg
          path: ligandx-darwin-universal.dmg
          if-no-files-found: error
          retention-days: 5

  # ============================================================
  # Create GitHub Release
  # ============================================================
  release:
    needs: [build-linux, build-windows, build-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release-tag
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "tag=${PUBLIC_RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            echo "title=Ligand-X Public Launcher latest" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && { [ -z "${VERSION}" ] || [ "${VERSION}" = "${PUBLIC_RELEASE_TAG}" ]; }; then
            echo "tag=${PUBLIC_RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            echo "title=Ligand-X Public Launcher latest" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=launcher-v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "title=Ligand-X Public Launcher ${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "title=Ligand-X Public Launcher ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release tag
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "${RELEASE_TAG}"
          git push -f origin "${RELEASE_TAG}"

      - name: Build runtime bundle
        run: ./scripts/build-runtime-bundle.sh artifacts/runtime

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: ${{ steps.release-tag.outputs.title }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          make_latest: ${{ steps.release-tag.outputs.tag == env.PUBLIC_RELEASE_TAG }}
          overwrite_files: true
          files: |
            artifacts/ligandx-linux-amd64.AppImage/ligandx-linux-amd64.AppImage
            artifacts/ligandx-windows-amd64.exe/ligandx-windows-amd64.exe
            artifacts/ligandx-darwin-universal.dmg/ligandx-darwin-universal.dmg
            artifacts/runtime/ligand-x-runtime.zip
          body: |
            ## ${{ steps.release-tag.outputs.title }}

            Cross-platform public GUI launcher for the Ligand-X molecular analysis platform.

            ### Downloads

            | Platform | File | Installation |
            |----------|------|--------------|
            | **Windows** (64-bit) | `ligandx-windows-amd64.exe` | Portable — double-click to run (no install). SmartScreen may warn (unsigned): **More info → Run anyway**. No admin required. |
            | **Runtime Bundle** | `ligand-x-runtime.zip` | Downloaded automatically by the launcher on first run |
            | **macOS** (Intel + Apple Silicon) | `ligandx-darwin-universal.dmg` | Open DMG, drag to Applications |
            | **Linux** (64-bit) | `ligandx-linux-amd64.AppImage` | `chmod +x`, double-click to run |

            ### Requirements

            - **Docker Desktop** (Windows/macOS) or **Docker Engine** (Linux)
            - Internet access to download the runtime bundle and selected Docker images

            ### Quick Start

            1. Download the appropriate file for your operating system
            2. Install/run the launcher:
               - **Windows**: Double-click `ligandx-windows-amd64.exe` (portable, no install)
               - **macOS**: Open DMG, drag app to Applications, launch from Applications
               - **Linux**: Make executable (`chmod +x *.AppImage`), double-click to run
            3. Complete the first-run setup; the launcher downloads `ligand-x-runtime.zip` automatically
            4. Select services and click "Install & Start"
            5. Click "Open App" to access Ligand-X in your browser

            ### macOS Gatekeeper Note

            On first launch, macOS may show "unidentified developer" warning. To open:
            - Right-click the app → Open → Click "Open" in the dialog
            - Or: System Preferences → Security & Privacy → "Open Anyway"

            ### Linux AppImage Note

            If double-click doesn't work, make it executable first:
            ```bash
            chmod +x ligandx-linux-amd64.AppImage
            ./ligandx-linux-amd64.AppImage
            ```
